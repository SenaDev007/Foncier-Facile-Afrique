      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8912E;stop-opacity:1" />
    </linearGradient>
    <pattern id="services-pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="2" fill="#EFEFEF" opacity="0.1"/>
      <circle cx="25" cy="25" r="1" fill="#EFEFEF" opacity="0.05"/>
      <circle cx="75" cy="75" r="1" fill="#EFEFEF" opacity="0.05"/>
